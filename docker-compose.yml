services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: inventory_app

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - mysql

  nginx:

    image: nginx:stable-alpine

    container_name: inventory_nginx

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:

    image: mysql:8.0

    container_name: inventory_mysql

    restart: unless-stopped

    environment:

      MYSQL_DATABASE: inventory_management

      MYSQL_ROOT_PASSWORD: root

      MYSQL_USER: laravel

      MYSQL_PASSWORD: secret

    ports:

      - "3306:3306"

    volumes:

      - mysql_data:/var/lib/mysql

  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: inventory_phpmyadmin

    restart: always

    ports:

      - "8081:80"

    environment:

      PMA_HOST: mysql

      MYSQL_ROOT_PASSWORD: root

    depends_on:

      - mysql

volumes:

  mysql_data: